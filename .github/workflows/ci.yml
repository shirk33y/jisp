name: CI
on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # `rust-cache` keeps compiled dependencies, not workspace incremental state.
  # Keep local and CI build-space behaviour aligned.
  CARGO_INCREMENTAL: 0

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          # One Rust version and lockfile family shares a bounded dependency
          # cache across jobs; the action prunes incremental/workspace artifacts.
          shared-key: jisp-rust-1.96.1
          cache-targets: "true"
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: JISP_VERIFY_C_BINDING=1 cargo test --workspace --exclude jisp-macros --quiet
      - run: cargo test -p jisp-macros --quiet
      - run: rustup target add wasm32-wasip2
      - run: cargo build -p jisp-ui-capability-component --target wasm32-wasip2 --release
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install pinned Wasmtime CLI outside the runner profile
        env:
          WASMTIME_VERSION: 46.0.1
        run: |
          export WASMTIME_HOME="$RUNNER_TEMP/wasmtime"
          export WASMTIME_ARCHIVE="wasmtime-v${WASMTIME_VERSION}-x86_64-linux.tar.xz"
          curl --proto '=https' --tlsv1.2 -sSfL \
            "https://github.com/bytecodealliance/wasmtime/releases/download/v${WASMTIME_VERSION}/${WASMTIME_ARCHIVE}" \
            -o "$RUNNER_TEMP/$WASMTIME_ARCHIVE"
          mkdir -p "$WASMTIME_HOME"
          tar -xJf "$RUNNER_TEMP/$WASMTIME_ARCHIVE" --strip-components=1 -C "$WASMTIME_HOME"
          echo "$WASMTIME_HOME" >> "$GITHUB_PATH"
      - name: Execute the capability component in two Component Model hosts
        run: scripts/verify-ui-capability-component-hosts.sh

  playground:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: jisp-rust-1.96.1
          cache-targets: "true"
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - uses: jetli/wasm-pack-action@v0.4.0
      - run: wasm-pack build crates/jisp-wasm --target web --out-dir ../../playground/pkg --out-name jisp_wasm
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm install --global agent-browser@0.31.2
      - run: agent-browser install --with-deps
      - run: scripts/test-playground.sh
