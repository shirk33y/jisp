[
  [import, yaml, "https://yaml.org/yaml.ts"],
  [import, { parse }, "https://json.org/json.ts"],
  [export, SOME_NUMBER, 42],
  [export, SOME_STRING, "some string"],
  [export, SOME_ALIAS, SOME_STRING],
  [
    export,
    Sidebar,
    # nested closures not possible, eg:
    # Sidebar:
    { items: [list, [obj, name: "Example", foo: "bar"]], config, ..., rest }: [
        ? {
            foo: [pow, 2, 16],
            some-var: [fmt, "formatted %s", bar],
            foo-var: [cat, [..., rest]],
            another-local-var:
              [., { items: { 0: { meta: { data } } } }: [capitalize, data]],
            # can 0 be variable?
            yet-another-local-var:
              [
                { items: { [{ index }: { meta: { data } }] } }:
                  [capitalize, data],
              ],
            more-concise?: [items, index, [? { name }]],
            more-conciserer?: [., items, index, { names }, {}],
            more-conciserererer?: { items, [{ index }]: { names }, {} },
            good?: { items: { : index, { names: { first-name, last-name } } } },
            # [ {
            list-comprehension:
              { items: [index: { names: { first-name, last-name } }] },

            dom-node-attr:
              {
                html:
                  { [index]: { h1: { attrs: { : [required-attr-name] } } } },
              },
            another-attr:
              [
                ? {
                    html:
                      {
                        [index]:
                          {
                            h1:
                              {
                                attrs:
                                  {
                                    [required-attr-name],
                                    href,
                                    class: h1-class,
                                  },
                              },
                          },
                      },
                    body: { class: body-class },
                  }
                : [join, h1-class, body-class, href],
              ],
            even-shorter-attr:
              [
                { html: { h1: { class: h1-class } } }:
                  [{ str: join }, h1-class, body-class, href],
              ],
          }
        # {}: ...   -> function
        # [{}: ...] -> self-called function
        # {[index]: {meta: {data}}}: [capitalize, data],
        : [
            div,
            rounded: [config, site],
            rounded-2xl: { config: { site: { : rounded-borders } } },
            rounded-xl:
              [., config, { site, rounded-borders, enabled }: enabled],
            px-5: [gt, 0, [len, items]],
            mx-4,
            lg:mx-2,
            [
              ul,
              mx-15,
              [
                each,
                items,
                { item, i }: [li, [text, [., item, authors, i, name]]],
              ],
            ],
            [
              ul,
              mx-15,
              [
                each,
                items,
                { item: { authors } }:
                  [
                    each,
                    authors,
                    { author: { first-name, last-name }, index }:
                      [
                        li,
                        text:
                          [
                            fmt,
                            "%d. %s, %s",
                            [upper, last-name],
                            [upper, first-name],
                          ],
                      ],
                  ],
              ],
            ],
            [
              ul,
              border-foo,
              bg-main-400,
              items-center: [eq, [., item, "url"], "/home"],
              lg:500,
              [
                each,
                items,
                { item, index }:
                  [
                    li,
                    rounded-full: [eq, 0, [mod, index, 2]],
                    lg:border-500,
                    bg-blue-400,
                    [
                      a,
                      href: [., item, "link"],
                      target: "_blank",

                      [text, [., item, "authors", index]],
                    ],
                  ],
              ],
            ],
          ],
        [header, rounded-123],
      ],
  ],
  [
    export,
    Menu,
    { visible: true, items }:
      [
        Menu,
        px-5,
        visible: visible,
        [Counter, text: [fmt, "Number of items: %s", [len, items]]],
        [
          Menu.Items,
          [
            each,
            items,
            { item: { name, id, link }, index }:
              [
                Menu.Item,
                key: id,
                [if, link, [a, href: link, text: name], [span, text: name]],
              ],
          ],
        ],
      ],
  ],
]
