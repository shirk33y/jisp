name: CI
on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace --exclude jisp-macros --quiet
      - run: cargo test -p jisp-macros --quiet
