$schema: "kompot.io/module.schema"
import: ["https://esm.sh/kompot/ui?dev": ui]
---
app:
  [
    ui.component,
    {config: {id: configId, grid, version}, name},
    [
      body,
      mx-4,
      px-2: [eq, name, "kompot"],
      [div, id: configId, w-full, grid-1: grid, [h1, text: "header"]],
    ],
  ]

sidebar:
  [
    ui.component,
    {},
    [
      nav,
      [
        ul,
        items-center,
        text-blue-700,
        [li, from-blue-300, to-blue-400, text: ""],
      ],
    ],
  ]

polish-notation:
  - [+, 1, 2]
  - 1+2
  - [., record, "title"]
  - "record.title"
# - map(attach-details, filter(only-even, merge(a, b)))
