[
  [
    def,
    unless,
    [
      ~,
      [
        fn,
        [condition, then, otherwise],
        [quasiquote, [if, [unquote, condition], [unquote, otherwise], [unquote, then]]],
      ],
    ],
  ],
  [
    def,
    preserve-caller,
    [~, [fn, [expression], [quasiquote, [let, [value, 1], [unquote, expression]]]]],
  ],
  [def, pair, [~, [fn, [left, right], [quote, [list, "left", "right"]]]]],
  [
    test,
    "portable runner expands quote and user macros before lowering",
    [
      assert.equal,
      [obj, "unless", "chosen", "hygiene", 42, "quote", [list, "left", "right"]],
      [
        let,
        [value, 42],
        [
          obj,
          "unless",
          [unless, false, "chosen", "skipped"],
          "hygiene",
          [preserve-caller, value],
          "quote",
          [pair, 1, 2],
        ],
      ],
    ],
  ],
]
