[
  [def, react, [import, "https://esm.sh/react?dev"]],
  [def, react-dom, [import, "https://esm.sh/react-dom?dev"]],
  [def, react-dom-server, [import, "http://esm.sh/react-dom/server?dev"]],

  # [log, react]],
  # [log, [get, react, "isValidElement"]],

  [
    def,
    tw,
    [
      fn,
      [..., tree],
      [
        let,
        # [classes, [list], props, [obj], children, [list]],
        [classes, [list], props, [obj], children, [list]],
        [
          !debug do,
          [
            list.map,
            tree,
            [
              fn,
              [item, index],
              [
                do,
                [
                  if,
                  [str.is, item],
                  [list.append, classes, item],
                  [
                    if,
                    [call, react, "isValidElement", item],
                    [
                      do,
                      [list.append, children, item],
                      [
                        set,
                        props,
                        "className",
                        [
                          str.cat,
                          [get, props, "className", ""],
                          " ",
                          [str.join, " ", classes],
                        ],
                      ],
                    ],
                    # [obj.merge, props, item],
                  ],
                ],
              ],
            ],
          ],
          # [log, props, children],
          [call, react, "createElement", "div", props, children],
        ],
      ],
    ],
  ],

  [def, border-green-500, "border-green-500"],
  [def, px-2, "px-2"],
  [def, bg-blue, "bg-blue"],
  # [def, ],

  [
    def,
    App,
    [tw, bg-blue, [tw, px-2, border-green-500, [tw, px-2], [tw, bg-blue]]],
    # [tw, bg-blue, [tw, px-2, border-green-500, [tw, title: "title"], [tw]]],
  ],

  [log, App],
  [log, [call, react-dom-server, "renderToString", App]],

  [
    def,
    main,
    [
      fn,
      [],
      [
        let,
        [
          root,
          [call, document, "createElement", "main"],
          body,
          [get, document, "body"],
        ],

        [
          do,
          [call, root, "setAttribute", "id", "react-root"],
          [call, body, "appendChild", root],
          [call, react-dom, "render", App, root],
        ],
      ],
    ],
  ],
  # [main],
]
