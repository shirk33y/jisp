$id: example.tw.jisp
$schema: jisp.org/tw.schema.json

# { foo, bar }: [import, "https://deno.land/std/foo.js"]

unless: [macro, {p, a, b}: [list, "if", p, b, a]]

app:
  {state, config, render, global}:
    [
      app-name: app-name,
      {scroll-y, set-scroll-y}: [use-state, -1],
      {config: {name: app-name, version, env}},
      {version: config.version},
      {events: {html-body-focused, html-body-scroll}},
      {window: global},
      [
        use-effect,
        {}:
          [
            listener:
              [
                window.add-event-listener,
                {e}: [set-scroll-y, e.target.scrollY],
              ],
            {}: [window.remove-event-listener, listener],
          ],
        [list, id, name],
      ],
      [
        handle-mouseover:
          [{e}: [e.preventDefault], [set-scroll-y, window.scroll-Y]],
      ],
      [
        html,
        id: "example",
        on-mouseover: handle-mouseover,
        on-scroll: html-body-scroll,
        on-focus: html-body-focused,
        [head, [meta, link, "foo:bar"], [meta, foo, "bar"]],
        [body, class: "modernizr", [div, id: "app"]],
      ],
    ]

---
mostly-html:
  [state]:
    [
      ul,
      id: "some-list",
      [
        li,
        [
          a,
          href: "http://google.com",
          _target: "blank",
          rel: "noopener",
          text: "Go to Google.com",
        ],
      ],
      [
        li,
        [
          a,
          href: "http://yahoo.com",
          _target: "blank",
          rel: "noopener",
          text: "Go to Yahoo.com",
        ],
      ],
      [
        li,
        [
          a,
          href: "http://bing.com",
          _target: "blank",
          rel: "noopener",
          text: "Go to Bing.com",
        ],
      ],
    ]
---
$schema: jisp.org/ui/events

html-body-focused:
  []: foo

---
bind-some-events:
  [state]:
    [
      html,
      id: "some-list",
      on-mouseover: handle-scroll,
      [head, [meta, link, "foo:bar"], [meta, foo, "bar"]],
      [body, class: "modernizr", [div, id: "app"]],
    ]
sidebar: [
    {foo, bar, channel},
    [dispatch: [use-dispatch]],
    [[counter, set-counter]: [use-state, 0]],
    [
      use-effect,
      {}: [
          do,
          [subscribe, channel],
          [do-something, else, 123, foo: bar],
          {}: [unsubscribe, channel],
        ], # last expr is a return value
      [list, channel, another-dep], # deps
    ],
    [
      div,
      rounded-2xl,
      px-5,
      mx-4,
      lg:mx-2,
      [ul, mx-15, [li, px-12, visibility: [lt, 1, config.site.visible-count]]],
      [ul, mx-15, [each, items, {item, i}: [get, item.authors, i, name]]],
      [
        ul,
        lg:flex-2,
        flex-col,
        items-center,
        [
          for,
          items,
          {item, i}:
            [
              a,
              href: [get, item, i, "link"],
              [
                li,
                on-click:
                  {{e}: [do, [e.prevent-default], [set-foo, e.target.value]]},
              ],
              rounded-full,
              [get, item.authors, i, "name"],
            ],
        ],
      ],
    ],
  ]
