[
  [
    def,
    continuation-order-sample,
    [
      fn,
      [],
      [
        obj,
        "kind",
        "nested",
        "value",
        [list, [+, 1, 2], [+, 3, 4], [+, 5, 6]],
        "tail-a",
        "A",
        "tail-b",
        "B",
        "done",
        [list, "done"],
      ],
    ],
  ],
  [
    def,
    inline-rest-params,
    [fn, [head, ..., tail], [+, [str.len, head], [list.len, tail]]],
  ],
  [
    def,
    rest-pattern,
    [
      fn,
      [value],
      [
        case,
        value,
        [[list, first, second, ..., rest], [+, [+, first, second], [list.len, rest]]],
        [_, 0],
      ],
    ],
  ],
  [
    test,
    "ws layout continuation preserves parent source order",
    [
      assert,
      [
        =,
        [
          obj,
          "kind",
          "nested",
          "value",
          [list, 3, 7, 11],
          "tail-a",
          "A",
          "tail-b",
          "B",
          "done",
          [list, "done"],
        ],
        [continuation-order-sample],
      ],
    ],
  ],
  [
    test,
    "ws inline ellipsis remains rest parameter syntax",
    [assert, [=, 6, [inline-rest-params, "head", "a", "b"]]],
  ],
  [
    test,
    "ws inline ellipsis remains rest pattern syntax",
    [assert, [=, 5, [rest-pattern, [list, 1, 2, 3, 4]]]],
  ],
]
