[
  [def, huge, [fn, [raw], [bigint, raw]]],
  [def, decimal, [fn, [value], [str.from, value]]],
  [
    test,
    "bigint constructor preserves values beyond int range",
    [
      assert,
      [
        =,
        [
          obj,
          "value",
          "32849384983498230592309502398509388908203986232306",
          "negative",
          "-9223372036854775809",
          "equal",
          true,
        ],
        [
          obj,
          "value",
          [decimal, [huge, "32849384983498230592309502398509388908203986232306"]],
          "negative",
          [decimal, [huge, "-9223372036854775809"]],
          "equal",
          [=, [huge, "9223372036854775808"], [huge, "9223372036854775808"]],
        ],
      ],
    ],
  ],
  [
    test,
    "bigint arithmetic stays arbitrary precision",
    [
      assert,
      [
        =,
        [
          obj,
          "sum",
          "1000000000000000000000000000003",
          "diff",
          "999999999999999999999999999997",
          "product",
          "3000000000000000000000000000000",
          "quotient",
          "333333333333333333333333333333",
        ],
        [
          let,
          [left, [huge, "1000000000000000000000000000000"], right, [huge, "3"]],
          [
            obj,
            "sum",
            [decimal, [+, left, right]],
            "diff",
            [decimal, [-, left, right]],
            "product",
            [decimal, [*, left, right]],
            "quotient",
            [decimal, [/, left, right]],
          ],
        ],
      ],
    ],
  ],
  [
    test,
    "bigint euclidean division and modulo match int semantics",
    [
      assert,
      [
        =,
        [obj, "neg-div", "-3", "neg-mod", "2", "pos-div", "3", "pos-mod", "1"],
        [
          let,
          [negative, [huge, "-7"], positive, [huge, "10"], divisor, [huge, "3"]],
          [
            obj,
            "neg-div",
            [decimal, [//, negative, divisor]],
            "neg-mod",
            [decimal, [%, negative, divisor]],
            "pos-div",
            [decimal, [//, positive, divisor]],
            "pos-mod",
            [decimal, [%, positive, divisor]],
          ],
        ],
      ],
    ],
  ],
  [
    test,
    "bigint comparisons and math helpers use bigint ordering",
    [
      assert,
      [
        =,
        [
          obj,
          "less",
          true,
          "greater",
          true,
          "min",
          "-50",
          "max",
          "100000000000000000000",
          "abs",
          "9223372036854775809",
        ],
        [
          let,
          [small, [huge, "-50"], large, [huge, "100000000000000000000"]],
          [
            obj,
            "less",
            [<, small, large],
            "greater",
            [>, large, small],
            "min",
            [decimal, [math.min, small, large]],
            "max",
            [decimal, [math.max, small, large]],
            "abs",
            [decimal, [math.abs, [huge, "-9223372036854775809"]]],
          ],
        ],
      ],
    ],
  ],
  [
    test,
    "bigints compose inside lists objects and conditionals",
    [
      assert,
      [
        =,
        [obj, "first", [ok, [bigint, "9223372036854775808"]], "has", true, "branch", "large"],
        [
          let,
          [
            value,
            [huge, "9223372036854775808"],
            values,
            [list, value, [huge, "9223372036854775809"]],
          ],
          [
            obj,
            "first",
            [list.get, values, 0],
            "has",
            [list.has, values, value],
            "branch",
            [if, [>, value, [huge, "0"]], "large", "zero"],
          ],
        ],
      ],
    ],
  ],
]
